<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Viewer · The Drum Protocols</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --dp-gold:#B8860B;--dp-gold-light:#D4A017;--dp-gold-pale:#3a2e10;
  --dp-slate:#2C3E50;--dp-slate-mid:#243345;--dp-slate-dark:#1a2633;
  --dp-slate-deeper:#131e28;--dp-slate-deepest:#0d1720;
  --dp-slate-light:#4A5F72;
  --color-text-primary:#e8e4dc;--color-text-secondary:#9aabb8;--color-text-tertiary:#607080;
  --color-border:rgba(255,255,255,0.06);--color-border-mid:rgba(255,255,255,0.10);
  --color-border-gold:rgba(184,134,11,0.22);
  --radius-sm:6px;--radius-md:10px;--radius-lg:16px;
  --shadow-soft:0 10px 30px rgba(0,0,0,0.3);
}
body{font-family:'DM Sans',sans-serif;background:var(--dp-slate-deepest);color:var(--color-text-primary)}
a{color:inherit}

/* NAV */
.site-nav{background:var(--dp-slate-deeper);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;border-bottom:1px solid var(--color-border)}
.nav-brand{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--dp-gold-light);text-decoration:none;font-weight:500;white-space:nowrap}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-link{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:rgba(255,255,255,.45);text-decoration:none;transition:color .15s;white-space:nowrap}
.nav-link:hover{color:#fff}.nav-link.active{color:var(--dp-gold-light)}
.nav-hamburger{display:none;flex-direction:column;justify-content:center;gap:5px;width:32px;height:32px;cursor:pointer;background:none;border:none;padding:4px;flex-shrink:0}
.nav-hamburger span{display:block;height:2px;width:100%;background:rgba(255,255,255,0.55)}
.nav-hamburger:hover span{background:#fff}
@media(max-width:640px){
  .site-nav{padding:0 16px}
  .nav-links{display:none;position:fixed;top:52px;left:0;right:0;background:var(--dp-slate-deeper);border-bottom:1px solid var(--color-border-mid);flex-direction:column;gap:0;z-index:199}
  .nav-links.open{display:flex}
  .nav-link{padding:14px 20px;border-bottom:1px solid var(--color-border);font-size:12px}
  .nav-link:last-child{border-bottom:none}
  .nav-hamburger{display:flex}
}

/* LAYOUT */
.page{max-width:1280px;margin:0 auto;padding:28px 24px 40px}
.viewer-shell{display:grid;grid-template-columns:360px minmax(0,1fr);gap:16px;align-items:start}

/* SIDE PANEL */
.panel{
  background:var(--dp-slate-deeper);
  border:1px solid var(--color-border-mid);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-soft);
  padding:22px 22px 24px;
  position:sticky;top:72px;
}
.eyebrow{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--dp-gold-light);margin-bottom:10px}
.title{font-family:'Cormorant Garamond',serif;font-size:38px;line-height:1.05;margin-bottom:12px;color:#fff}
.authors{font-size:13px;line-height:1.65;color:var(--color-text-secondary);margin-bottom:16px}
.meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.badge{display:inline-flex;align-items:center;height:24px;padding:0 9px;border-radius:999px;border:1px solid var(--color-border-gold);background:var(--dp-gold-pale);font-size:10px;letter-spacing:.11em;text-transform:uppercase;color:var(--dp-gold-light)}

/* ABSTRACT */
.abstract{padding:16px;border-radius:14px;background:rgba(184,134,11,0.06);border:1px solid var(--color-border-gold);margin-bottom:14px}
.abstract-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--dp-gold-light);opacity:.7;margin-bottom:8px}
.abstract p,.citation-box{font-size:13px;line-height:1.75;color:var(--color-text-secondary)}

/* CITATION */
.citation-wrap{margin-top:14px}
.small-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:8px}
.citation-box{border:1px solid var(--color-border-mid);background:var(--dp-slate-dark);border-radius:12px;padding:12px 14px}

/* BUTTONS */
.actions{display:grid;gap:10px;margin-top:16px}
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:42px;padding:0 16px;border-radius:var(--radius-md);text-decoration:none;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:all .15s ease;border:1px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--dp-gold);color:#fff;border-color:var(--dp-gold)}
.btn-primary:hover{background:var(--dp-gold-light);border-color:var(--dp-gold-light)}
.btn-secondary{background:rgba(255,255,255,.04);color:var(--color-text-primary);border-color:var(--color-border-mid)}
.btn-secondary:hover{border-color:var(--color-border-gold);background:rgba(255,255,255,.07)}
.copy-status{font-size:12px;color:var(--color-text-tertiary);min-height:16px}

/* PDF VIEWER */
.viewer{overflow:hidden;background:var(--dp-slate-deeper);border:1px solid var(--color-border-mid);border-radius:var(--radius-lg);box-shadow:var(--shadow-soft)}
.viewer-top{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--color-border);background:var(--dp-slate-dark)}
.viewer-name{font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--color-text-tertiary)}
.viewer-frame{width:100%;height:calc(100vh - 150px);border:0;display:block;background:var(--dp-slate-mid)}

/* BACK LINK */
.back-link{display:inline-flex;align-items:center;gap:7px;text-decoration:none;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dp-gold-light);margin-bottom:14px;opacity:.8;transition:opacity .15s}
.back-link:hover{opacity:1}

@media(max-width:1024px){.viewer-shell{grid-template-columns:1fr}.panel{position:relative;top:0}.viewer-frame{height:78vh}}
@media(max-width:720px){.page{padding:18px 16px 28px}.title{font-size:32px}}
@media(max-width:520px){.viewer-top{flex-direction:column;align-items:flex-start;gap:8px}}
</style>
</head>
<body>
<nav class="site-nav">
  <a class="nav-brand" href="index.html">The Drum Protocols</a>
  <button class="nav-hamburger" aria-label="Open menu" aria-expanded="false" onclick="toggleNav(this)">
    <span></span><span></span><span></span>
  </button>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="learn.html">Learn About</a>
    <a class="nav-link" href="adviser.html">Adviser</a>
    <a class="nav-link" href="insights.html">Insights</a>
    <a class="nav-link" href="protocol.html">Protocols</a>
    <a class="nav-link" href="sphere.html">Data Lab</a>
    <a class="nav-link active" href="research.html">Research</a>
    <a class="nav-link" href="about.html">About Me</a>
    <a class="nav-link" href="safety.html">Safety</a>
  </div>
</nav>
<div class="page">
  <div class="viewer-shell">
    <aside class="panel">
      <a class="back-link" href="research.html">← Back to research library</a>
      <div class="eyebrow" id="docCategory">Research document</div>
      <h1 class="title" id="docTitle">Research document</h1>
      <div class="authors" id="docAuthors"></div>
      <div class="meta-row" id="docBadges"></div>
      <section class="abstract">
        <div class="abstract-label">Abstract</div>
        <p id="docAbstract"></p>
      </section>
      <div class="citation-wrap">
        <div class="small-label">Suggested citation</div>
        <div class="citation-box" id="docCitation"></div>
      </div>
      <div class="actions">
        <a class="btn btn-primary" id="openPdf" target="_blank" rel="noopener">Open PDF</a>
        <a class="btn btn-secondary" id="downloadPdf" download>Download PDF</a>
        <button class="btn btn-secondary" id="copyCitation" type="button">Copy citation</button>
        <div class="copy-status" id="copyStatus"></div>
      </div>
    </aside>
    <section class="viewer">
      <div class="viewer-top">
        <div class="viewer-name" id="viewerName">Local PDF viewer</div>
        <a class="btn btn-secondary" href="research.html">Return to library</a>
      </div>
      <iframe class="viewer-frame" id="pdfFrame" title="Research PDF viewer"></iframe>
    </section>
  </div>
</div>
<script>
function toggleNav(btn) {
  const links = document.querySelector('.nav-links');
  const open = links.classList.toggle('open');
  btn.setAttribute('aria-expanded', open);
}
document.addEventListener('click', function(e) {
  if (!e.target.closest('.site-nav')) {
    document.querySelector('.nav-links').classList.remove('open');
    const btn = document.querySelector('.nav-hamburger');
    if (btn) btn.setAttribute('aria-expanded', 'false');
  }
});
const docs = {
  'clinical-overview-brief': {
    title: 'Clinical Overview Brief',
    category: 'Clinical overview · first read',
    authors: 'The Drum Protocols · Faces of Dragonfly',
    badges: ['Clinical', 'Introductory', 'Shorter brief'],
    abstract: 'A concise orientation document for clinicians, caregivers, journalists, and new visitors. This brief introduces the regulatory goal of the system, the broad signal design rationale, and the intended framing for first-contact readers before they move into the deeper reference materials.',
    citation: 'The Drum Protocols. Clinical Overview Brief. Faces of Dragonfly. Available at: /research/clinical-overview-brief.pdf',
    pdf: 'research/clinical-overview-brief.pdf'
  },
  'reference': {
    title: 'Reference',
    category: 'Core reference · technical document',
    authors: 'The Drum Protocols · Faces of Dragonfly',
    badges: ['Core reference', 'Technical', 'Long-form'],
    abstract: 'The principal long-form reference for the system. This document is the best entry point for readers who want the full conceptual architecture, signal framework, protocol logic, and deeper technical reasoning behind the auditory and neural design claims.',
    citation: 'The Drum Protocols. Reference. Faces of Dragonfly. Available at: /research/reference.pdf',
    pdf: 'research/reference.pdf'
  },
  'experimental-validation-plan': {
    title: 'Experimental Validation Plan',
    category: 'Validation roadmap · study design',
    authors: 'The Drum Protocols · Faces of Dragonfly',
    badges: ['Validation', 'Study design', 'Roadmap'],
    abstract: 'A phased plan for testing the system through staged evaluation. It gives structure to outcome gathering, comparative protocol testing, and the transition from early listener-reported signal into more formal validation pathways.',
    citation: 'The Drum Protocols. Experimental Validation Plan. Faces of Dragonfly. Available at: /research/experimental-validation-plan.pdf',
    pdf: 'research/experimental-validation-plan.pdf'
  },
  'research-citations-guide': {
    title: 'Research Citations Guide',
    category: 'Supporting literature · reference map',
    authors: 'The Drum Protocols · Faces of Dragonfly',
    badges: ['References', 'Evidence base', 'Supporting literature'],
    abstract: 'A structured guide to the supporting literature, intended to help researchers and technically minded readers trace the broader evidence base that informs the site, the protocol framing, and the surrounding neuroscience context.',
    citation: 'The Drum Protocols. Research Citations Guide. Faces of Dragonfly. Available at: /research/research-citations-guide.pdf',
    pdf: 'research/research-citations-guide.pdf'
  }
};
const params = new URLSearchParams(window.location.search);
const key = params.get('doc') || 'clinical-overview-brief';
const doc = docs[key] || docs['clinical-overview-brief'];
document.title = `${doc.title} · Research Viewer · The Drum Protocols`;
document.getElementById('docCategory').textContent = doc.category;
document.getElementById('docTitle').textContent = doc.title;
document.getElementById('docAuthors').textContent = doc.authors;
document.getElementById('docAbstract').textContent = doc.abstract;
document.getElementById('docCitation').textContent = doc.citation;
document.getElementById('viewerName').textContent = doc.title + ' · local PDF';
const badges = document.getElementById('docBadges');
doc.badges.forEach(label => {
  const span = document.createElement('span');
  span.className = 'badge';
  span.textContent = label;
  badges.appendChild(span);
});
const openPdf = document.getElementById('openPdf');
const downloadPdf = document.getElementById('downloadPdf');
const pdfFrame = document.getElementById('pdfFrame');
openPdf.href = doc.pdf;
downloadPdf.href = doc.pdf;
pdfFrame.src = doc.pdf + '#view=FitH';
document.getElementById('copyCitation').addEventListener('click', async () => {
  const status = document.getElementById('copyStatus');
  try {
    await navigator.clipboard.writeText(doc.citation);
    status.textContent = 'Citation copied.';
  } catch (err) {
    status.textContent = 'Clipboard copy was blocked. You can copy from the citation box above.';
  }
});
</script>
</body>
</html>
