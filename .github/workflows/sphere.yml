name: Sphere Pipeline

on:
  schedule:
    - cron: '0 6 * * 1'     # every Monday at 06:00 UTC
  workflow_dispatch:          # manual trigger from Actions tab

jobs:
  run-sphere:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install supabase anthropic scipy numpy python-dotenv openai google-api-python-client google-auth

      - name: Run YouTube ingestion
        env:
          SUPABASE_URL:            ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY:    ${{ secrets.SUPABASE_SERVICE_KEY }}
          YOUTUBE_CLIENT_ID:       ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:   ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python youtube_ingestion.py --days 7

      - name: Run Sphere pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_VECTOR_KEY:    ${{ secrets.OPENAI_VECTOR_KEY }}
        run: python sphere_pipeline.py --output data.json

      - name: Commit data.json
        run: |
          git config user.name  "Sphere Pipeline"
          git config user.email "sphere@faces-of-dragonfly.bot"
          git add data.json
          git diff --cached --quiet || git commit -m "data: $(date +%Y-%m-%d) [auto]"
          git push